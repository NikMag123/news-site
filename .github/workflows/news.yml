name: News Rewriter

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai requests beautifulsoup4

      - name: Run news script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          OPENAI_MODEL: gpt-4o-mini
        run: python news.py

      - name: Refresh news.json from GitHub
        run: |
          git fetch origin main
          git checkout origin/main -- news.json

      - name: Prepare deploy folder
        run: |
          mkdir deploy
          cp news.json deploy/news.json

      - name: Upload news.json via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.TIMEWEB_HOST }}
          username: ${{ secrets.TIMEWEB_USER }}
          password: ${{ secrets.TIMEWEB_PASSWORD }}
          port: ${{ secrets.TIMEWEB_PORT }}
          protocol: ftp
          local-dir: ./deploy/
          server-dir: /news/public_html/
          dangerous-clean-slate: false
