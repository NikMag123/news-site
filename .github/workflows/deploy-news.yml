name: Deploy news.json

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 */3 * *'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload news.json via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.TIMEWEB_HOST }}
          username: ${{ secrets.TIMEWEB_USER }}
          password: ${{ secrets.TIMEWEB_PASSWORD }}
          port: ${{ secrets.TIMEWEB_PORT }}
          protocol: ftp
          local-dir: ./
          server-dir: /news/public_html/
          dangerous-clean-slate: false
