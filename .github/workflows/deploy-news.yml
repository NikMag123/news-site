name: Deploy news.json

on:
  workflow_run:
    workflows: ["News Rewriter"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare deploy folder
        run: |
          mkdir deploy
          cp news.json deploy/news.json

      - name: Upload news.json via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.TIMEWEB_HOST }}
          username: ${{ secrets.TIMEWEB_USER }}
          password: ${{ secrets.TIMEWEB_PASSWORD }}
          port: ${{ secrets.TIMEWEB_PORT }}
          protocol: ftp
          local-dir: ./deploy/
          server-dir: /news/public_html/
          dangerous-clean-slate: false
